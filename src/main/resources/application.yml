server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: fmanager

  datasource:
    url: jdbc:postgresql://localhost:5432/fmanager_db
    username: ${DB_USERNAME:fmanager_user}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 510MB

file-manager:
  base-path: ${FILE_MANAGER_BASE_PATH:/data/filemanager}
  blocked-extensions: exe,bat,sh,cmd,ps1,vbs,jar
  max-file-size-bytes: 524288000
  audit-enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.corp.fmanager: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
